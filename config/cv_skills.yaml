# CV Skill Self-Assessment — honest calibration for the German cultural-PM job market
#
# self_rating: 0–10 scale
#   0    = not started
#   1–3  = awareness / conceptual only
#   4–6  = intermediate / working knowledge, defensible in an interview
#   7–9  = proficient / can lead projects and defend choices
#   10   = recognised expert
#
# cv_claimed: true = currently presented on Xi's CV
# evidence: concrete projects or experience that backs the rating
# limitations: what is missing and could be challenged in an interview
#
# Skill names MUST match skill_matrix.yaml for gap analysis to work.

profile:
  name: "Cultural Project Manager"
  target_positioning: >
    Cultural project manager for education programs, event production,
    concert houses and exhibitions in Germany (Stuttgart / Leonberg
    region), re-entering after a family phase with renewed PM
    methodology (Google PM, Scrum Master I).
  current_status: "Family phase since 2019; active job search starting 2026"
  target_roles:
    - "Projektmanager*in Kultur (concert house, music school, festival)"
    - "Bildungsreferent*in Musik / Kulturelle Bildung"
    - "Education Manager — Konzerthaus / Musikhochschule"
    - "Veranstaltungsmanager*in Kultur"
    - "Projektassistenz / Projektkoordination Kulturamt"
    - "Pressereferent*in / Kommunikationsreferent*in (cultural institution)"

skills:

  # ── Project management core ──────────────────────────────────────────────

  - name: "Cultural project management practice (DE conventions)"
    self_rating: 5
    cv_claimed: true
    evidence: >
      Five years of practical cultural project work at China National Symphony
      Orchestra (CNSO), Beijing: coordinated concert workflows, supported concert
      managers across scheduling, artist liaison, and press cycles. Master of
      Arts in Music & Cultural Administration (Université d'Evry val d'Essonne)
      gave a structured grounding in cultural-sector management theory.
    limitations: >
      Practical experience is in the Chinese public-orchestra system. German
      cultural-sector governance (Trägerschaft, öffentliche/freie Träger,
      Fördermittel, GEMA, Künstlersozialkasse) is studied but not yet practised
      at first hand. No DE work history yet.

  - name: "Project management certification (Google PM + Scrum Master I)"
    self_rating: 3
    cv_claimed: true
    evidence: >
      Google Project Manager certificate in progress on Coursera. Professional
      Scrum Master I (PSM I) preparation in progress. Mention both as
      "in progress, expected Q2/Q3 2026" — do not yet claim completed.
    limitations: >
      Neither certificate is completed. Should not be listed as a finished
      credential until exam pass. No prior agile delivery practice in
      production cultural projects.

  - name: "External job search and applications"
    self_rating: 4
    cv_claimed: false
    evidence: >
      Actively building an application pipeline for the DE cultural sector.
      Familiar with major job boards (Bundesagentur für Arbeit, Indeed,
      LinkedIn, Kulturmanagement.net Stellenmarkt, Stepstone). Starting to
      track open Stuttgart-region vacancies systematically.
    limitations: >
      Pipeline is young; few completed application cycles yet. Limited
      recruiter network in the German cultural sector. Has not yet
      conducted a DE-cultural-sector interview.

  - name: "CV, LinkedIn and portfolio for DE cultural sector"
    self_rating: 4
    cv_claimed: false
    evidence: >
      German CV (Lebenslauf) drafted in DE-standard format with photo and
      handwritten signature. LinkedIn profile exists. Initial reframing of
      CNSO experience into Projektmanagement vocabulary in progress.
    limitations: >
      LinkedIn German content still light. Portfolio artefacts (programme
      booklets, press releases, event timelines) from China are mostly in
      Chinese — bilingual versions need to be prepared for interviews.

  # ── Subject-matter strengths ─────────────────────────────────────────────

  - name: "PR, media and content for cultural institutions"
    self_rating: 7
    cv_claimed: true
    evidence: >
      Five years' lead responsibility for CNSO press and media work:
      conception and execution of press strategy within institutional
      guidelines, drafting of all advertising and programme copy in Chinese
      (print and online), management of social-media channels, central
      interface between musicians, composers and journalists.
    limitations: >
      Strongest in Chinese-language PR; German-language PR writing is at
      B2 level and would require editorial support for final published
      copy. No DE press-distribution-list knowledge yet.

  - name: "Music education and Musikvermittlung"
    self_rating: 4
    cv_claimed: false
    evidence: >
      Bachelor of Arts in Musicology (Xinghai Conservatory, Guangzhou) plus
      multi-year piano studies at Conservatoire de Perpignan and
      Conservatoire d'Evry (Diplôme d'Études Musicales, piano). Familiar
      with the pedagogical landscape from the inside. Some indirect
      exposure to music-education programming at CNSO.
    limitations: >
      No formal Musikvermittlung project ownership yet. Konzertpädagogik,
      Schulkooperation and Kinderkonzert-format experience is theoretical
      rather than practical. Limited contact with DE music-school
      ecosystem so far.

  - name: "Event production and coordination"
    self_rating: 5
    cv_claimed: true
    evidence: >
      Concert event coordination at CNSO: schedule liaison, artist hosting,
      programme-book production, dress-rehearsal logistics, press calls.
      Supported tour and guest-conductor visits.
    limitations: >
      DE-specific operational landscape (GEMA settlement, KSK obligations,
      ticketing platforms Reservix/Eventim, venue tech-rider conventions,
      BG Bau and event-safety rules) is new and would need on-the-job
      learning. No production-tech background.

  - name: "Exhibitions and museum education"
    self_rating: 2
    cv_claimed: false
    evidence: >
      Conceptual awareness from music-institution context (programme
      curation, audience development principles transfer). No museum-sector
      project experience.
    limitations: >
      No curatorial, Sammlungsmanagement or Museumspädagogik experience.
      Only pursue museum vacancies that explicitly value cross-art-form
      cultural-PM transferability.

  # ── Languages ────────────────────────────────────────────────────────────

  - name: "German language (written and spoken)"
    self_rating: 5
    cv_claimed: true
    evidence: >
      Telc B2 certificate. Written B2 confirmed. Daily German use at home
      and in family administration context. Comfortable reading cultural-
      sector job ads and writing application letters with editorial review.
    limitations: >
      Spoken fluency lags written: noticeable hesitation under interview
      pressure, formal Bürokommunikation register still developing. This
      is Xi's self-identified largest gap; structured spoken practice is
      the highest-ROI development item.

  - name: "English language"
    self_rating: 5
    cv_claimed: true
    evidence: >
      B1 self-declared. Working knowledge for reading professional content
      and basic written communication.
    limitations: >
      Not used as primary working language in past role. Spoken English
      not yet tested in a professional cultural-sector context.

  - name: "Chinese language"
    self_rating: 10
    cv_claimed: true
    evidence: >
      Native speaker, editorial-level written competence (multi-year
      practice writing press releases, programme notes, and advertising
      copy at CNSO).
    limitations: >
      Translates into a CV asset where bilingual or trilingual roles exist
      (Chinese-cultural-exchange programmes, Goethe-Institut China
      partnerships, museums with Asian-collection programming).

  - name: "French language"
    self_rating: 3
    cv_claimed: true
    evidence: >
      Three years of university study and life in France (Perpignan, Evry,
      Paris) during conservatory and master's studies; conversational
      basics retained.
    limitations: >
      Not maintained at professional level since 2014. Should be presented
      as Grundkenntnisse, not professional working language.

  # ── Productivity ─────────────────────────────────────────────────────────

  - name: "MS Office (Word, Excel, PowerPoint)"
    self_rating: 7
    cv_claimed: true
    evidence: >
      Routine daily use throughout CNSO role and continuing through family
      phase: programme documents, contact lists, presentations, budget
      tracking.
    limitations: >
      No advanced Excel (PivotTables/Power Query) or PowerBI experience
      claimed.

  - name: "AI tools for cultural administration"
    self_rating: 5
    cv_claimed: true
    evidence: >
      Active use of Claude / ChatGPT-class tools for drafting, translation
      proof-reading, audience-data summarisation, and information
      management. Treats AI as productivity tool, not as decision system.
    limitations: >
      No prompt-engineering certification. Not positioning as AI/ML
      practitioner — only as competent end-user.

  - name: "Local cultural-sector networking (Stuttgart region)"
    self_rating: 2
    cv_claimed: false
    evidence: >
      Resident of Leonberg with access to Stuttgart cultural infrastructure.
      Aware of key venues (Liederhalle, Staatsoper Stuttgart, Musikhochschule
      Stuttgart, Theaterhaus, Schlossfestspiele Ludwigsburg).
    limitations: >
      Has not yet built a personal contact network inside these
      institutions. Active networking is part of the weekly plan.
