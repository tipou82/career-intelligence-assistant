# Job market signal queries.
# Each entry defines a search run against the Bundesagentur für Arbeit API
# (Germany) and/or Indeed RSS (global/Europe).
#
# Region priority: germany first, then europe, then global.
# For external_transition mode, Germany and Europe queries are most actionable.

