# Email digest configuration.
# Copy this file and fill in your credentials.
# IMPORTANT: Never commit credentials to git — use environment variables instead.
#
# Environment variable overrides (take precedence over values here):
#   EMAIL_SMTP_HOST, EMAIL_SMTP_PORT, EMAIL_USERNAME, EMAIL_PASSWORD,
#   EMAIL_FROM, EMAIL_TO

enabled: false          # set to true to enable auto-send after run-weekly

smtp_host: "smtp.gmail.com"
smtp_port: 465          # 465 = SSL/TLS,  587 = STARTTLS
use_ssl: true           # true for port 465, false for 587 (STARTTLS)

# Use app-specific password for Gmail (not your main password)
username: "your@gmail.com"
password: "your-app-password"

from: "your@gmail.com"
to: "your@gmail.com"

subject_prefix: "Career Brief"   # → "Career Brief – 2026-20"
