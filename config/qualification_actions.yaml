# Qualification Actions Configuration
# Career transition sprint configuration for external-market readiness.
# Context: senior Bosch functional safety / system safety engineer in Drehscheibe;
# focus is broad external transition in Germany/Europe. Bosch Japan remains optional.

qualification_strategy:
  target_person: "Max Mustermann"
  career_mode: "external_transition"
  weekly_hours_cap: 30
  weekly_hours_stretch_cap: 35
  daily_deep_focus_hours: 6
  currency: "EUR"
  planning_date: "2026-05-13"

  current_situation: >
    Full-time available for qualification, job search, portfolio work and interview preparation,
    while also having family responsibilities with two small children. Bosch Japan remains a
    still-possible option but is not the focus. The main objective is to secure external-market
    employability and income stability in Germany/Europe.

  strategic_positioning: >
    Senior System Safety / Functional Safety Architect for safety-critical embedded systems,
    ADAS, robotics, industrial automation and AI-enabled systems.

  principle: >
    Prioritize qualifications and outputs that improve external employability within 3–6 months.
    Prefer visible proof such as CV updates, LinkedIn positioning, interview case studies,
    certification milestones and portfolio artifacts. Avoid overclaiming: conceptual understanding,
    course completion and practical project experience must be clearly distinguished.

  coaching_guardrails:
    - "Protect family income: prioritize senior roles and transferable safety expertise over risky junior reskilling."
    - "Do not let ROS2, C++, QNX or AI implementation work dominate over job search and interview conversion."
    - "Use CMSE as a robotics/industrial-automation bridge, not as a complete identity change."
    - "Never claim professional QNX experience; phrase it as QNX/POSIX supervisor concept understanding."
    - "Keep Bosch Japan optional, not central."
    - "Every weekly recommendation must produce a visible output or improve application conversion."
    - "Do not recommend expensive certificates unless they clearly improve target-role access."

  cmse_milestone:
    name: "CMSE training and certification"
    provider_context: "TÜV NORD / PILZ"
    date_start: "2026-06-15"
    date_end: "2026-06-18"
    career_relevance: "Robotics safety, machinery safety, industrial automation and ISO 13849 transition credibility"
    pre_training_target_rating: 4
    after_training_target_rating: 5
    three_month_target_rating: 6

  phase_plan:
    pre_cmse:
      date_until: "2026-06-14"
      goal: "External market readiness plus CMSE preparation"
      weekly_allocation_hours:
        external_job_search_pipeline: 8
        interview_preparation: 5
        cmse_iso_13849_preparation: 7
        cv_linkedin_portfolio: 4
        functional_safety_case_studies: 3
        ai_safety_sotif_iso_pas_8800: 1.5
        ros2_qnx_linux_demonstrator: 1.5
    cmse_week:
      date_start: "2026-06-15"
      date_end: "2026-06-18"
      goal: "Pass certification and extract interview-relevant machinery safety language"
      daily_note_template:
        - "Key concepts learned today"
        - "Concepts transferable from ISO 26262"
        - "Concepts different from ISO 26262"
        - "Interview wording"
        - "Portfolio application"
    post_cmse:
      date_from: "2026-06-19"
      goal: "Convert CMSE into external-market value"
      weekly_allocation_hours:
        applications_and_recruiters: 10
        interview_preparation: 5
        cmse_practical_consolidation: 4
        cv_linkedin_portfolio_update: 4
        functional_safety_case_studies: 3
        ai_safety_sotif_iso_pas_8800: 2
        ros2_qnx_linux_demonstrator: 2

  candidate_profile:
    name: "Max Mustermann"
    nationality: "Chinese"
    current_location: "Germany"
    highest_education: "Master of Science in Electrical / Electronics Engineering, Technical University of Munich"
    years_of_work_experience: 19
    current_employer_context: "Robert Bosch GmbH; currently in Drehscheibe/internal transition context"
    previous_field: "Automotive embedded systems, AUTOSAR, HiL, functional safety, system safety, platform safety"

    language_levels:
      mandarin: "native"
      german: "C1/C2 professional working proficiency; goal is C2-level rhetorical precision"
      english: "C1/C2 professional working proficiency"
      japanese: "JLPT N1; business communication possible, still improving formal keigo and interview fluency"

    current_certificates:
      - "JLPT N1"
      - "IBM Generative AI Engineering Specialization, Coursera, 2024"
      - "DeepLearning.AI Deep Learning Specialization, 2018"
      - "CMSE scheduled for 2026-06-15 to 2026-06-18"

    known_profile_gaps:
      - "No practical QNX project experience; only conceptual QNX/POSIX supervisor understanding"
      - "Limited practical ISO 13849 / machinery safety project experience before CMSE"
      - "ROS2 and modern C++ are portfolio-level skills, not yet senior professional robotics software skills"
      - "SOTIF and ISO/PAS 8800 are conceptually understood but not yet deep project ownership areas"
      - "External-market CV, LinkedIn and application pipeline need to be sharpened for Germany/Europe"
      - "Need interview-ready senior case studies that translate Bosch platform safety experience into external value"
      - "Need broader company targeting outside Bosch, especially robotics, industrial automation, safety consulting, TÜV/assessment, aerospace and rail"

    core_strengths:
      - "ISO 26262 functional safety experience in automotive embedded systems"
      - "System safety requirements and technical safety concept work"
      - "Safety mechanism architecture and safety trade-off reasoning"
      - "Platform safety experience with SoC, PMIC, reset, safe state, diagnostics and FFI concepts"
      - "Requirements engineering, traceability and review experience with DOORS NG"
      - "MBSE/SysML understanding and architecture documentation"
      - "Multilingual profile: Chinese, German, English and Japanese"
      - "Current portfolio project: safety-supervised edge AI demonstrator using Raspberry Pi, ROS2, Linux and QNX-inspired supervisor concepts"

    self_ratings_0_to_10:
      functional_safety_iso26262: 8
      system_safety_architecture: 8
      safety_requirements_engineering: 8
      mbse_sysml: 7
      sotif_iso21448: 5
      iso_pas_8800: 4
      iso_13849_cmse_current: 3
      qnx_posix_supervisor_concepts: 3
      linux_practical_skills: 4.5
      ros2: 4
      cpp20_safety_logic: 3.5
      python_automation: 5
      ai_perception_monitoring: 4
      github_portfolio_documentation: 5
      interview_communication: 6

  target_roles:
    - title: "Senior Functional Safety Engineer / Functional Safety Architect"
      sector: "Automotive, embedded systems, Tier-1, OEM, engineering service providers"
      typical_requirements:
        - "ISO 26262 project experience"
        - "Safety concepts, safety requirements and safety mechanisms"
        - "System/software/hardware interface understanding"
        - "Stakeholder communication and safety argumentation"
    - title: "System Safety Engineer / Safety Architect"
      sector: "Safety-critical embedded systems, ADAS, robotics, industrial automation"
      typical_requirements:
        - "Risk-based safety engineering"
        - "Architecture-level trade-off reasoning"
        - "Requirements traceability"
        - "Cross-domain hardware/software/system collaboration"
    - title: "Machine Safety / Robotics Safety Engineer"
      sector: "Robotics, machinery, industrial automation"
      typical_requirements:
        - "ISO 13849, IEC 62061 or IEC 61508 awareness"
        - "Safety functions, PLr/PL, Categories, MTTFd, DCavg and CCF"
        - "Robot cell or machinery risk assessment"
        - "CMSE or comparable certification preferred"
    - title: "Safety Consultant / Assessor"
      sector: "TÜV, certification bodies, engineering consulting, safety assessment"
      typical_requirements:
        - "Strong safety standard knowledge"
        - "Customer-facing communication"
        - "Safety case and assessment logic"
        - "Ability to translate across automotive, machinery and embedded domains"
    - title: "Embedded / Platform Safety Architect"
      sector: "Automotive SDV, embedded platforms, SoC-based safety systems"
      typical_requirements:
        - "Embedded platform safety"
        - "SoC/PMIC/reset/safe-state/diagnostics reasoning"
        - "Freedom from interference concepts"
        - "AUTOSAR, Linux/QNX or comparable embedded-platform awareness"
    - title: "ADAS / SOTIF / AI-enabled Safety Engineer"
      sector: "ADAS, automated driving, safety-critical AI-enabled systems"
      typical_requirements:
        - "ISO 26262 and SOTIF understanding"
        - "ODD, perception limitations, monitoring and fallback concepts"
        - "AI outside safety-critical decision path where necessary"
        - "Safety-supervised architecture concepts"

qualification_actions:
  - id: "external_job_search_pipeline"
    market_signal_keywords:
      job_signals: ["functional_safety", "safety_architecture", "system_safety", "safety architect", "safety manager"]
      articles:    ["hiring", "layoffs", "restructuring", "job opening", "wir suchen"]
    name: "External job search pipeline for senior safety roles"
    scores:
      market_frequency: 0.95
      target_role_relevance: 1.00
      profile_gap: 0.90
      evidence_output: 0.90
      feasibility: 0.90
      cost_time_penalty: 0.05
    override_category: "must_have"
    profile_gap_addressed: "External-market transition requires a structured application pipeline beyond Bosch"
    recommended_action: >
      Build and maintain an application tracker with target companies, job titles, application status,
      recruiter contacts, interview feedback and next actions. Apply weekly to carefully selected senior
      safety roles in Germany/Europe rather than waiting for internal Bosch options.
    expected_visible_output: "Application tracker with at least 30 target companies and 10 active applications"
    estimated_weekly_hours: 8
    estimated_cost_eur: 0
    estimated_duration_weeks: 12
    cv_linkedin_usage: "Use market feedback to continuously tune CV and LinkedIn wording"
    interview_usage: "Clarifies target narrative and salary/seniority positioning"
    target_role_relevance_note: "This is the highest-priority action for income protection and transition execution"
    reason_for_priority: "Without applications and recruiter outreach, qualification work does not convert into offers"
    reason_for_deferral_if_any: null

  - id: "cv_linkedin_safety_architect_positioning"
    market_signal_keywords:
      job_signals: ["functional_safety", "system_safety", "safety_architecture"]
      articles:    ["functional safety", "safety architect", "senior safety"]
    name: "CV and LinkedIn repositioning as Senior Safety Architect"
    scores:
      market_frequency: 0.95
      target_role_relevance: 0.95
      profile_gap: 0.85
      evidence_output: 0.95
      feasibility: 0.95
      cost_time_penalty: 0.00
    override_category: "must_have"
    profile_gap_addressed: "Current profile must be externally readable and not too Bosch-internal"
    recommended_action: >
      Create one English master CV, one German CV and one LinkedIn profile version using the headline
      'Senior Functional Safety / System Safety Architect'. Emphasize ISO 26262, safety architecture,
      safety requirements, safety mechanisms, embedded platform safety, MBSE, and transition toward
      robotics, industrial automation and AI-enabled safety-critical systems.
    expected_visible_output: "English CV, German CV and updated LinkedIn profile"
    estimated_weekly_hours: 4
    estimated_cost_eur: 0
    estimated_duration_weeks: 2
    cv_linkedin_usage: "Primary output used in all applications"
    interview_usage: "Ensures recruiter and interviewer understand senior safety value immediately"
    target_role_relevance_note: "Directly required for every external application"
    reason_for_priority: "High leverage, low cost, immediate effect"
    reason_for_deferral_if_any: null

  - id: "interview_case_studies_senior_safety"
    market_signal_keywords:
      job_signals: ["functional_safety", "safety_architecture", "safety case"]
      articles:    ["functional safety", "safety architecture", "safety concept"]
    name: "Three senior safety interview case studies"
    scores:
      market_frequency: 0.90
      target_role_relevance: 0.95
      profile_gap: 0.85
      evidence_output: 0.90
      feasibility: 0.90
      cost_time_penalty: 0.00
    override_category: "must_have"
    profile_gap_addressed: "Need interview-defensible evidence for senior safety architecture value"
    recommended_action: >
      Prepare three one-page case studies: 1) S32G/platform safety and safe-state/reset concept,
      2) Mobileye/TDA4 missing-NMI workaround with FIQ plus cyclic monitoring, and 3) safety-supervised
      edge AI demonstrator with deterministic runtime safety supervision. Use STAR/CAR structure and
      emphasize constraints, decisions, safety argumentation and business impact.
    expected_visible_output: "Three one-page interview case-study notes"
    estimated_weekly_hours: 5
    estimated_cost_eur: 0
    estimated_duration_weeks: 3
    cv_linkedin_usage: "Convert into achievement bullets and LinkedIn project descriptions"
    interview_usage: "Core evidence for seniority, problem-solving and architecture judgment"
    target_role_relevance_note: "Relevant to all target roles, especially safety architect and consultant roles"
    reason_for_priority: "Interview conversion depends more on strong stories than on another generic course"
    reason_for_deferral_if_any: null

  - id: "cmse_iso_13849_preparation"
    market_signal_keywords:
      job_signals: ["iso_13849", "cmse", "machinery_safety"]
      articles:    ["iso 13849", "machinery safety", "performance level", "cmse", "safety function"]
    name: "CMSE / ISO 13849 preparation before 15 June 2026"
    scores:
      market_frequency: 0.75
      target_role_relevance: 0.85
      profile_gap: 0.90
      evidence_output: 0.85
      feasibility: 0.80
      cost_time_penalty: 0.20
    override_category: "must_have"
    profile_gap_addressed: "Limited practical machinery safety and ISO 13849 experience before CMSE"
    recommended_action: >
      Prepare before CMSE by studying safety functions, PLr determination, Categories B/1/2/3/4,
      MTTFd, DCavg, CCF and SISTEMA basics. Focus on understanding and transfer from ISO 26262,
      not on memorizing every formula. Training/certification is scheduled for 2026-06-15 to 2026-06-18.
    expected_visible_output: "CMSE preparation notes and later CMSE certificate if passed"
    estimated_weekly_hours: 7
    estimated_cost_eur: 0
    estimated_duration_weeks: 5
    cv_linkedin_usage: "Before course: 'CMSE certification scheduled June 2026'; after passing: list certificate"
    interview_usage: "Explain how ISO 26262 experience transfers to machinery and robotics safety"
    target_role_relevance_note: "High relevance for robotics, machinery and industrial automation safety roles"
    reason_for_priority: "Fixed milestone on 15 June; improves external-market breadth"
    reason_for_deferral_if_any: null

  - id: "post_cmse_practical_consolidation"
    market_signal_keywords:
      job_signals: ["iso_13849", "cmse", "robotics"]
      articles:    ["iso 13849", "machinery safety", "collaborative robot"]
    name: "Post-CMSE machinery safety mini-case and transfer note"
    scores:
      market_frequency: 0.70
      target_role_relevance: 0.85
      profile_gap: 0.85
      evidence_output: 0.90
      feasibility: 0.85
      cost_time_penalty: 0.00
    override_category: "high_roi"
    profile_gap_addressed: "Certification alone is weaker than practical, interview-defensible application"
    recommended_action: >
      After CMSE, create one robot-cell safety function mini-case and one portfolio note titled
      'From ISO 26262 to ISO 13849: Transferable Safety Engineering Principles'. Include hazard,
      safety function, PLr reasoning, category assumption, diagnostics, safe state and validation idea.
    expected_visible_output: "docs/safety/iso13849_cmse_transfer_note.md and one robot-cell safety-function mini-case"
    estimated_weekly_hours: 4
    estimated_cost_eur: 0
    estimated_duration_weeks: 3
    cv_linkedin_usage: "Use as portfolio evidence for robotics/machinery safety transition"
    interview_usage: "Shows ability to apply CMSE concepts rather than merely attending the course"
    target_role_relevance_note: "Especially relevant for robotics, industrial automation and consulting roles"
    reason_for_priority: "Converts certificate into usable market evidence"
    reason_for_deferral_if_any: "Start after CMSE training week"

  - id: "functional_safety_architecture_refresh"
    market_signal_keywords:
      job_signals: ["functional_safety", "iso_26262", "safety_architecture"]
      articles:    ["functional safety", "iso 26262", "safety mechanism", "safety concept"]
    name: "Functional safety and system safety architecture refresh"
    scores:
      market_frequency: 0.95
      target_role_relevance: 0.95
      profile_gap: 0.35
      evidence_output: 0.75
      feasibility: 0.90
      cost_time_penalty: 0.00
    override_category: "high_roi"
    profile_gap_addressed: "Strong existing skill must be packaged as external-market value"
    recommended_action: >
      Refresh and document core safety architecture topics: safety mechanisms, safe states,
      degraded modes, diagnostics, FFI, safety requirements, technical safety concepts,
      PMHF reasoning and safety argumentation. Convert Bosch project knowledge into public-safe,
      non-confidential interview language.
    expected_visible_output: "Senior safety architecture notes and CV/interview bullet points"
    estimated_weekly_hours: 3
    estimated_cost_eur: 0
    estimated_duration_weeks: 6
    cv_linkedin_usage: "Supports senior safety architect positioning"
    interview_usage: "Foundation for technical interviews"
    target_role_relevance_note: "Directly relevant to all senior functional safety and system safety roles"
    reason_for_priority: "This is the candidate's strongest market differentiator"
    reason_for_deferral_if_any: null

  - id: "sotif_iso_pas_8800_ai_safety_bridge"
    market_signal_keywords:
      job_signals: ["sotif", "iso_pas_8800", "adas"]
      articles:    ["sotif", "iso/pas 8800", "ai safety automotive", "ai regulation"]
    name: "SOTIF / ISO/PAS 8800 / AI safety bridge"
    scores:
      market_frequency: 0.65
      target_role_relevance: 0.75
      profile_gap: 0.70
      evidence_output: 0.65
      feasibility: 0.75
      cost_time_penalty: 0.10
    override_category: "high_roi"
    profile_gap_addressed: "Need credible but not overclaimed AI-enabled safety positioning"
    recommended_action: >
      Build concise knowledge notes on SOTIF, ODD, perception limitations, runtime monitoring,
      deterministic fallback and ISO/PAS 8800. Connect these to the edge AI demonstrator and to
      the principle that AI/LLMs should not be part of the runtime safety decision path.
    expected_visible_output: "Two-page AI-enabled safety concept note linked to portfolio project"
    estimated_weekly_hours: 2
    estimated_cost_eur: 0
    estimated_duration_weeks: 6
    cv_linkedin_usage: "Mention as strategic extension, not as deep production experience"
    interview_usage: "Answer questions about ADAS, SOTIF and AI safety trade-offs"
    target_role_relevance_note: "Useful for ADAS, automated-driving and AI-enabled embedded safety roles"
    reason_for_priority: "Differentiates the candidate while keeping focus on safety architecture"
    reason_for_deferral_if_any: null

  - id: "github_portfolio_safety_supervised_ai_demo"
    market_signal_keywords:
      job_signals: ["ros2", "robotics", "embedded_ai"]
      articles:    ["ros2", "physical ai", "humanoid", "embedded ai", "robotics safety"]
    name: "Polish safety-supervised edge AI portfolio demonstrator"
    scores:
      market_frequency: 0.55
      target_role_relevance: 0.75
      profile_gap: 0.65
      evidence_output: 0.95
      feasibility: 0.75
      cost_time_penalty: 0.05
    override_category: "high_roi"
    profile_gap_addressed: "Need visible proof of future-facing AI/robotics safety positioning"
    recommended_action: >
      Make the GitHub portfolio externally readable: clear README, safety concept, architecture diagram,
      traceability table, test evidence and short demo video. Prioritize documentation and safety argumentation
      over endless implementation depth.
    expected_visible_output: "Interview-ready GitHub repository and portfolio summary"
    estimated_weekly_hours: 3
    estimated_cost_eur: 0
    estimated_duration_weeks: 8
    cv_linkedin_usage: "Add selected project link and concise project description"
    interview_usage: "Demonstrates initiative and ability to connect safety architecture with AI-enabled systems"
    target_role_relevance_note: "Relevant for robotics, embedded AI safety and safety architecture roles"
    reason_for_priority: "Visible proof is valuable, but it should not displace applications"
    reason_for_deferral_if_any: null

  - id: "linkedin_recruiter_networking"
    market_signal_keywords:
      job_signals: ["functional_safety", "safety_architecture"]
      articles:    ["hiring", "layoffs", "restructuring", "talent shortage"]
    name: "LinkedIn recruiter and professional networking sprint"
    scores:
      market_frequency: 0.85
      target_role_relevance: 0.85
      profile_gap: 0.80
      evidence_output: 0.70
      feasibility: 0.90
      cost_time_penalty: 0.00
    override_category: "high_roi"
    profile_gap_addressed: "Need broader external professional network outside Bosch"
    recommended_action: >
      Contact 5–10 relevant recruiters, hiring managers or safety professionals per week.
      Use a concise message focused on senior safety architecture, ISO 26262, platform safety,
      CMSE timeline and openness to robotics/industrial automation/ADAS/safety consulting roles.
    expected_visible_output: "Networking tracker with contacts, replies and follow-up actions"
    estimated_weekly_hours: 3
    estimated_cost_eur: 0
    estimated_duration_weeks: 12
    cv_linkedin_usage: "Improves profile visibility and recruiter inbound probability"
    interview_usage: "Provides market feedback and possible referral channels"
    target_role_relevance_note: "Important for hidden job market and senior roles"
    reason_for_priority: "Many senior roles are filled via recruiters or referrals"
    reason_for_deferral_if_any: null

  - id: "ros2_practical_basics"
    market_signal_keywords:
      job_signals: ["ros2", "robotics"]
      articles:    ["ros2", "robotics", "humanoid", "physical ai"]
    name: "ROS2 practical basics for safety-supervised robotics demonstrator"
    scores:
      market_frequency: 0.60
      target_role_relevance: 0.55
      profile_gap: 0.75
      evidence_output: 0.75
      feasibility: 0.65
      cost_time_penalty: 0.05
    override_category: "nice_to_have"
    profile_gap_addressed: "ROS2 is useful for robotics credibility but not core senior safety value"
    recommended_action: >
      Continue ROS2 only at portfolio-support level: nodes, topics, launch files, fault injection and monitoring.
      Do not attempt to become a senior ROS2 developer during the transition sprint.
    expected_visible_output: "Working ROS2 demo elements and concise documentation"
    estimated_weekly_hours: 1.5
    estimated_cost_eur: 0
    estimated_duration_weeks: 12
    cv_linkedin_usage: "List as portfolio experience, not professional robotics software experience"
    interview_usage: "Shows technical curiosity and enough practical understanding to collaborate with robotics teams"
    target_role_relevance_note: "Useful mainly for robotics-oriented roles"
    reason_for_priority: "Helpful, but secondary to safety architecture and job search"
    reason_for_deferral_if_any: "Keep time-boxed; do not let it dominate"

  - id: "qnx_posix_supervisor_concepts"
    market_signal_keywords:
      job_signals: ["qnx", "embedded"]
      articles:    ["qnx", "software-defined vehicle", "rtos"]
    name: "QNX / POSIX supervisor concept consolidation"
    scores:
      market_frequency: 0.45
      target_role_relevance: 0.55
      profile_gap: 0.70
      evidence_output: 0.65
      feasibility: 0.60
      cost_time_penalty: 0.10
    override_category: "nice_to_have"
    profile_gap_addressed: "No practical QNX experience; only conceptual understanding"
    recommended_action: >
      Document QNX-inspired supervisor concepts using POSIX/Linux implementation where available.
      State honestly that this is conceptual and demonstrator-level, not professional QNX project experience.
    expected_visible_output: "QNX/POSIX supervisor concept note in portfolio"
    estimated_weekly_hours: 1
    estimated_cost_eur: 0
    estimated_duration_weeks: 8
    cv_linkedin_usage: "Phrase as 'QNX/POSIX supervisor concepts' rather than 'QNX experience'"
    interview_usage: "Useful when discussing SDV, safety supervisor and partitioning concepts"
    target_role_relevance_note: "Differentiator for embedded platform safety, but not a must-have"
    reason_for_priority: "Useful conceptually; low practical depth must be transparent"
    reason_for_deferral_if_any: "Do not invest heavily unless target jobs repeatedly require QNX"

  - id: "cpp20_safety_logic_basics"
    market_signal_keywords:
      job_signals: ["embedded", "functional_safety"]
      articles:    ["c++20", "embedded software", "safety-critical software"]
    name: "C++20 safety logic basics with tests"
    scores:
      market_frequency: 0.70
      target_role_relevance: 0.45
      profile_gap: 0.75
      evidence_output: 0.65
      feasibility: 0.55
      cost_time_penalty: 0.05
    override_category: "nice_to_have"
    profile_gap_addressed: "Modern C++ is useful but not the core target identity"
    recommended_action: >
      Implement small, testable safety-logic components such as StateEvaluator, HeartbeatMonitor,
      TimeoutChecker and PlausibilityChecker with unit tests. Keep scope small and portfolio-focused.
    expected_visible_output: "Small C++ safety-logic module with tests"
    estimated_weekly_hours: 1.5
    estimated_cost_eur: 0
    estimated_duration_weeks: 8
    cv_linkedin_usage: "Mention only as demonstrator implementation support"
    interview_usage: "Shows hands-on credibility without claiming senior C++ developer level"
    target_role_relevance_note: "Helpful for embedded safety roles but not mandatory for safety architect positioning"
    reason_for_priority: "Useful, but lower ROI than applications, interviews and CMSE"
    reason_for_deferral_if_any: "Increase only if job ads repeatedly require hands-on C++"

  - id: "mbse_sysml2_maintenance"
    market_signal_keywords:
      job_signals: ["mbse"]
      articles:    ["mbse", "sysml", "digital twin", "dassault"]
    name: "MBSE / SysML2 lightweight maintenance"
    scores:
      market_frequency: 0.50
      target_role_relevance: 0.55
      profile_gap: 0.40
      evidence_output: 0.55
      feasibility: 0.80
      cost_time_penalty: 0.00
    override_category: "nice_to_have"
    profile_gap_addressed: "Existing MBSE knowledge should remain visible but not dominate the sprint"
    recommended_action: >
      Maintain MBSE credibility by creating one architecture diagram, one safety state model and one traceability table
      for the demonstrator. Do not deep-dive SysML2 unless target job ads explicitly demand it.
    expected_visible_output: "Architecture diagram and traceability table"
    estimated_weekly_hours: 1
    estimated_cost_eur: 0
    estimated_duration_weeks: 6
