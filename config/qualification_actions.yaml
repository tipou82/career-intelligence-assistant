# Qualification Actions Configuration — cultural-PM transition sprint
#
# Context: cultural-project-manager re-entry into the German labour market
# (Stuttgart / Leonberg region), 15h weekly budget, family phase with two
# small children. Two PM certifications already in progress.

qualification_strategy:
  target_person: "Xi"
  career_mode: "external_transition"
  weekly_hours_cap: 15
  weekly_hours_stretch_cap: 18
  daily_deep_focus_hours: 2
  currency: "EUR"
  planning_date: "2026-05-13"

  current_situation: >
    Re-entering the German cultural-sector labour market after a 6.7-year
    family phase. Two children (childcare secured). Telc B2 German achieved
    with spoken fluency lagging. Google Project Manager certificate and
    Professional Scrum Master I in progress. Local focus on Leonberg,
    Stuttgart, Böblingen, Ludwigsburg; mid-level cultural-PM roles in
    education programs, event production, music institutions and museums
    (in that priority order).

  strategic_positioning: >
    Cultural Project Manager with international cultural-administration
    background (China National Symphony Orchestra; Master of Arts in
    Music & Cultural Administration, France), modern PM methodology
    (Google PM + Scrum), and trilingual (CN/DE/EN) profile.

  principle: >
    Prioritise qualifications and outputs that improve external
    employability within 3–6 months. Visible proof matters more than
    additional theory: complete pending certificates, produce bilingual
    portfolio artefacts, and structure interview stories around concrete
    CNSO project examples reframed in German PM vocabulary. Be honest
    about practice gaps (DE-specific funding, KSK, GEMA, spoken German
    pressure-test).

  coaching_guardrails:
    - "Spoken German fluency is the single biggest interview risk — protect that learning time first."
    - "Finish the in-progress Google PM and Scrum Master I before starting another course."
    - "Reframe CNSO work in DE PM vocabulary — do not present Xi as 'former Chinese PR' but as 'multilingual cultural project manager'."
    - "Education programs and event production are the primary sub-sectors — do not let museum or pure-PR vacancies dominate the pipeline."
    - "Do not pursue further academic degrees during the sprint — the existing French M.A. plus PM certs is enough."
    - "Local first — Leonberg / Stuttgart / Böblingen / Ludwigsburg — before broader DE/EU."
    - "Family time is non-negotiable; weekly plan must stay within 15h cap."

  phase_plan:
    pre_certifications:
      date_until: "2026-08-15"
      goal: "Complete Google PM + Scrum Master I, rebuild bilingual portfolio, start application pipeline"
      weekly_allocation_hours:
        applications_and_outreach: 4
        spoken_german_practice: 3
        google_pm_and_scrum_certifications: 3
        cv_linkedin_portfolio: 2
        cultural_pm_dach_practice: 1
        musikvermittlung_event_production: 1.5
        networking_local: 0.5
    post_certifications:
      date_from: "2026-08-16"
      goal: "Convert certifications into offers; widen pipeline"
      weekly_allocation_hours:
        applications_and_outreach: 5
        spoken_german_practice: 3
        interview_rehearsal: 2
        cv_linkedin_portfolio_update: 2
        musikvermittlung_event_production: 2
        networking_local: 1

  candidate_profile:
    name: "Xi"
    nationality: "Chinese"
    work_permit: "unrestricted (Germany)"
    current_location: "Leonberg, Baden-Württemberg"
    family_status: "married, two small children (childcare secured)"
    highest_education: "Master of Arts in Music & Cultural Administration, Université d'Evry val d'Essonne, France (2014)"
    additional_education:
      - "Diplôme d'Études Musicales (Piano), Conservatoire à Rayonnement Départemental Evry, 2012"
      - "Études musicales (Piano), Conservatoire à Rayonnement Régional Perpignan, 2008–2011"
      - "Bachelor of Arts in Musicology, Xinghai Conservatory of Music, Guangzhou, 2008"
    years_of_work_experience: 5
    career_gap: "August 2019 – ongoing (family phase + German language acquisition)"
    previous_field: "Cultural project management, PR & media work at China National Symphony Orchestra (Beijing)"

    language_levels:
      chinese: "native (editorial level)"
      german: "Telc B2 written; spoken below written — target B2+/C1 spoken confidence"
      english: "B1"
      french: "basic conversational (lapsed since 2014)"

    current_certificates_in_progress:
      - "Google Project Manager (Coursera) — in progress, target completion 2026 Q2/Q3"
      - "Professional Scrum Master I (PSM I) — in progress, target exam 2026 Q2/Q3"

    completed_certificates:
      - "Telc B2 German"
      - "Diplôme d'Études Musicales (Piano)"

    known_profile_gaps:
      - "Spoken German fluency below written B2 (Xi's own #1 priority)"
      - "Career gap since 2019 — needs reframing as deliberate family + skills phase"
      - "No DE work history — recruiters use this as a filter"
      - "DE cultural-sector governance vocabulary (Trägerschaft, KSK, GEMA, Fördermittel) is theoretical"
      - "Local Stuttgart-area cultural network is thin"
      - "Pending PM certificates are not yet completed (cannot yet be claimed)"

    core_strengths:
      - "Five years' practical cultural project work at a national symphony orchestra"
      - "Master's degree in music and cultural administration (France)"
      - "Lead responsibility for press, media and social-media at CNSO"
      - "Multilingual (Chinese native, German B2, English B1, French basic)"
      - "Conservatory-level musical training (piano, musicology) — gives credibility with artists"
      - "Two PM certifications actively in progress — signals proactive re-entry"
      - "Unrestricted DE work permit; family logistics secured"

    self_ratings_0_to_10:
      cultural_project_management_dach: 5
      pm_certification_pipeline: 3
      pr_media_cultural: 7
      music_education_musikvermittlung: 4
      event_production_dach: 5
      museum_exhibition: 2
      german_spoken: 4
      german_written: 6
      english: 5
      chinese: 10
      french: 3
      ms_office: 7
      ai_tools_productivity: 5
      local_network_stuttgart: 2

  target_roles:
    - title: "Projektmanager*in Kultur"
      sector: "Konzerthäuser, Festivals, Musikschulen, Kulturämter"
      typical_requirements:
        - "Projektkoordination und Schnittstellenmanagement"
        - "Veranstaltungsplanung und -abwicklung"
        - "Stakeholderkommunikation in DE"
        - "Sicherer Umgang mit MS Office"
    - title: "Bildungsreferent*in Kulturelle Bildung / Musikvermittlung"
      sector: "Konzerthäuser, Musikhochschulen, Musikschulen, Bildungsstiftungen"
      typical_requirements:
        - "Konzeption und Umsetzung von Bildungsformaten"
        - "Kooperation mit Schulen und Kitas"
        - "Pädagogisches Grundverständnis"
        - "Musikalische Sachkompetenz"
    - title: "Veranstaltungs- und Projektassistenz Kultur"
      sector: "Eventagenturen, Festivals, Konzertdirektionen, Kulturämter"
      typical_requirements:
        - "Operative Veranstaltungsabwicklung"
        - "Künstlerbetreuung"
        - "Reise- und Logistikplanung"
        - "Belastbarkeit am Veranstaltungstag"
    - title: "Pressereferent*in / Kommunikation"
      sector: "Kulturinstitutionen, Theater, Orchester, Museen"
      typical_requirements:
        - "Pressetexte und Programmkommunikation"
        - "Social-Media-Betreuung"
        - "Newsletter und Webseite"
        - "Englischkenntnisse"
    - title: "Education / Outreach Manager"
      sector: "Internationale Konzerthäuser, Stiftungen, Festivals"
      typical_requirements:
        - "Konzeption von Outreach- und Education-Programmen"
        - "Audience development"
        - "Englischkenntnisse"
        - "Erfahrung mit Drittmittelförderung"

qualification_actions:

  - id: "external_job_search_pipeline"
    market_signal_keywords:
      job_signals: ["kulturmanagement", "projektmanagement_kultur", "bildungsreferent", "veranstaltungsmanagement"]
      articles:    ["hiring", "stellenausschreibung", "wir suchen", "stellenangebot", "kulturmanager"]
    name: "Weekly application pipeline for DE cultural-PM roles"
    scores:
      market_frequency: 0.85
      target_role_relevance: 1.00
      profile_gap: 0.90
      evidence_output: 0.90
      feasibility: 0.95
      cost_time_penalty: 0.00
    override_category: "must_have"
    profile_gap_addressed: "No active application pipeline yet — without applications, qualification work does not convert"
    recommended_action: >
      Maintain a tracker with target organisations, roles, application
      status and contacts. Send three tailored applications and one active
      outreach (recruiter, alumni, hiring manager) per week, prioritising
      Stuttgart/Leonberg/Böblingen/Ludwigsburg. Focus on education programs
      and event production first.
    expected_visible_output: "Application tracker with ≥20 target organisations and ≥8 active applications by end of phase 1"
    estimated_weekly_hours: 4
    estimated_cost_eur: 0
    estimated_duration_weeks: 13
    cv_linkedin_usage: "Continuously refined based on application feedback"
    interview_usage: "Tracker informs the conversation about which roles Xi has researched"
    target_role_relevance_note: "Highest priority — re-entry depends on consistent application activity"
    reason_for_priority: "Conversion to offers requires applications, not more theory"
    reason_for_deferral_if_any: null

  - id: "spoken_german_intensive"
    market_signal_keywords:
      job_signals: ["kulturmanagement", "projektmanagement_kultur"]
      articles:    ["interview", "vorstellungsgespräch", "sprachkurs", "tandem"]
    name: "Spoken German practice (tandem, conversation course, coaching)"
    scores:
      market_frequency: 0.90
      target_role_relevance: 0.95
      profile_gap: 0.95
      evidence_output: 0.65
      feasibility: 0.85
      cost_time_penalty: 0.15
    override_category: "must_have"
    profile_gap_addressed: "Spoken German below written B2 is Xi's own #1 priority and the single biggest interview risk"
    recommended_action: >
      Combine two channels per week: (a) a structured group (VHS Leonberg
      or Stuttgart cultural-language tandem) and (b) a 1-on-1 paid Sprachcoach
      or italki tutor once a week. Always practise out loud — never silent
      reading. Build a personal phrasebook of cultural-sector vocabulary
      (Pressemitteilung, Programmübersicht, Drittmittel, Künstlerhonorar,
      Bildungspartnerschaft, etc.).
    expected_visible_output: "Weekly phrasebook entries; one recorded mock-interview answer per week"
    estimated_weekly_hours: 3
    estimated_cost_eur: 80
    estimated_duration_weeks: 26
    cv_linkedin_usage: "Improves performance in interviews and networking calls — not a CV line"
    interview_usage: "Directly affects every interview outcome"
    target_role_relevance_note: "Required across all target roles"
    reason_for_priority: "All other strengths fail to convert if spoken German falters under pressure"
    reason_for_deferral_if_any: null

  - id: "google_pm_scrum_certifications"
    market_signal_keywords:
      job_signals: ["projektmanagement_kultur", "veranstaltungsmanagement"]
      articles:    ["scrum master", "agile", "project manager certification", "pmp", "pmi"]
    name: "Complete Google Project Manager + Professional Scrum Master I"
    scores:
      market_frequency: 0.65
      target_role_relevance: 0.80
      profile_gap: 0.75
      evidence_output: 0.90
      feasibility: 0.85
      cost_time_penalty: 0.15
    override_category: "must_have"
    profile_gap_addressed: "Two certifications already in progress but not yet completed — completion adds visible credibility and reframes the family-phase gap"
    recommended_action: >
      Set explicit weekly module targets to finish Google PM by ~Q2 2026 and
      pass PSM I by ~Q3 2026. Book exam dates as soon as preparation is at
      ~80%. After passing, add to CV (Zertifikate), LinkedIn (Lizenzen &
      Zertifikate) and cover letters.
    expected_visible_output: "Two finished certificates (PDFs) listed on CV and LinkedIn"
    estimated_weekly_hours: 3
    estimated_cost_eur: 150
    estimated_duration_weeks: 16
    cv_linkedin_usage: "List under Zertifikate; reference in summary line"
    interview_usage: "Answers 'what have you been doing during the family phase' with concrete proof"
    target_role_relevance_note: "Strongest signal for project-management roles outside the narrow Kulturmanagement track"
    reason_for_priority: "Half-finished credentials are worth little; finishing them is the highest-leverage learning task"
    reason_for_deferral_if_any: null

  - id: "cv_linkedin_de_cultural_pm"
    market_signal_keywords:
      job_signals: ["kulturmanagement", "projektmanagement_kultur"]
      articles:    ["kulturmanagement", "bewerbung", "linkedin tipps"]
    name: "Bilingual CV + LinkedIn positioning as Cultural Project Manager"
    scores:
      market_frequency: 0.90
      target_role_relevance: 0.90
      profile_gap: 0.80
      evidence_output: 0.95
      feasibility: 0.95
      cost_time_penalty: 0.00
    override_category: "must_have"
    profile_gap_addressed: "CV currently reads as 'former Chinese-orchestra PR' — needs translation into DE cultural-PM vocabulary"
    recommended_action: >
      Produce three artefacts: (1) German master CV with headline
      "Projektmanagerin Kultur — Bildung, Veranstaltung, Kommunikation",
      (2) English short CV for international institutions, (3) LinkedIn
      profile (DE + EN sections) with three concrete CNSO project examples
      reframed in DE PM vocabulary (Projektkoordination, Künstlerbetreuung,
      Pressearbeit, Bildungsformate).
    expected_visible_output: "DE CV, EN CV, LinkedIn profile, three reframed project examples (1-page each)"
    estimated_weekly_hours: 2
    estimated_cost_eur: 0
    estimated_duration_weeks: 6
    cv_linkedin_usage: "Primary output used in every application"
    interview_usage: "Provides the structured examples interviewers will probe"
    target_role_relevance_note: "Directly required for every target role"
    reason_for_priority: "High leverage, low cost, immediate effect on application response rate"
    reason_for_deferral_if_any: null

  - id: "musikvermittlung_case_studies"
    market_signal_keywords:
      job_signals: ["bildungsreferent", "musikvermittlung"]
      articles:    ["musikvermittlung", "konzertpädagogik", "kinderkonzert", "kulturelle bildung"]
    name: "Musikvermittlung case studies — three concrete programme sketches"
    scores:
      market_frequency: 0.55
      target_role_relevance: 0.85
      profile_gap: 0.75
      evidence_output: 0.85
      feasibility: 0.85
      cost_time_penalty: 0.00
    override_category: "high_roi"
    profile_gap_addressed: "Education programs are sub-sector #1 but Xi has no DE-side practical Musikvermittlung project on file"
    recommended_action: >
      Sketch three short concept papers (1 page each): (a) a Schulkonzert
      programme for primary-school children with Stuttgart Liederhalle as
      venue, (b) a Kinder-Klangwerkstatt format combining piano and
      music-history storytelling, (c) a Musikhochschule Stuttgart
      open-house programme for prospective students. Each should include
      target audience, format, partners, rough budget logic.
    expected_visible_output: "Three 1-page Musikvermittlung concept sketches in German"
    estimated_weekly_hours: 1
    estimated_cost_eur: 0
    estimated_duration_weeks: 8
    cv_linkedin_usage: "Add as 'Konzepte' samples on portfolio or LinkedIn"
    interview_usage: "Concrete proof of Musikvermittlung thinking for Bildungsreferent interviews"
    target_role_relevance_note: "Essential for sub-sector #1 (education programs)"
    reason_for_priority: "Closes the no-DE-Musikvermittlung-experience gap with visible artefacts"
    reason_for_deferral_if_any: null

  - id: "dach_cultural_sector_governance"
    market_signal_keywords:
      job_signals: ["kulturmanagement", "projektmanagement_kultur"]
      articles:    ["kulturförderung", "fördermittel", "ksk", "gema", "trägerschaft"]
    name: "DE cultural-sector governance literacy (KSK, GEMA, Fördermittel, Trägerschaft)"
    scores:
      market_frequency: 0.70
      target_role_relevance: 0.75
      profile_gap: 0.80
      evidence_output: 0.55
      feasibility: 0.85
      cost_time_penalty: 0.05
    override_category: "high_roi"
    profile_gap_addressed: "Theoretical only — needs to become interview-fluent vocabulary"
    recommended_action: >
      One topic per week, ~1 page of personal notes: (1) Künstlersozialkasse
      basics for employers, (2) GEMA tariffs and concert-organiser duties,
      (3) Fördermittel landscape in BW (Land BW, Stadt Stuttgart,
      Kulturstiftung des Bundes), (4) öffentliche vs. freie Träger,
      (5) typical Kulturamt budget structure, (6) Drittmittelantrag basics.
    expected_visible_output: "One-page note per topic, ~6 notes total"
    estimated_weekly_hours: 1
    estimated_cost_eur: 0
    estimated_duration_weeks: 6
    cv_linkedin_usage: "Underpins LinkedIn summary phrasing"
    interview_usage: "Allows competent answers to 'How would you structure a Drittmittelantrag?'"
    target_role_relevance_note: "Important for any role that touches funding or contracts"
    reason_for_priority: "Cheap, fast and closes a real recruiter-perceived gap"
    reason_for_deferral_if_any: null

  - id: "local_network_stuttgart"
    market_signal_keywords:
      job_signals: ["kulturmanagement", "veranstaltungsmanagement"]
      articles:    ["kulturveranstaltung", "kulturnetzwerk", "kulturamt"]
    name: "Local cultural-sector networking sprint (Stuttgart region)"
    scores:
      market_frequency: 0.70
      target_role_relevance: 0.75
      profile_gap: 0.85
      evidence_output: 0.65
      feasibility: 0.80
      cost_time_penalty: 0.05
    override_category: "high_roi"
    profile_gap_addressed: "Many cultural roles in BW are filled via network — Xi's current network is thin"
    recommended_action: >
      One concrete contact step per week: attend an info evening at
      Leonberger Kulturamt or Stadthalle Leonberg, write to a Musikhochschule
      Stuttgart alumni officer, or message one cultural-PM person on
      LinkedIn for a 20-minute Kennenlerngespräch. Track outcomes.
    expected_visible_output: "Networking tracker with ≥10 contacts and ≥3 conversations by end of phase 1"
    estimated_weekly_hours: 0.5
    estimated_cost_eur: 20
    estimated_duration_weeks: 26
    cv_linkedin_usage: "Improves LinkedIn visibility and inbound recruiter probability"
    interview_usage: "Provides referral channels and informal market feedback"
    target_role_relevance_note: "Important for hidden BW cultural-sector job market"
    reason_for_priority: "Hidden market is large in cultural sector; small weekly cost"
    reason_for_deferral_if_any: null

  - id: "interview_rehearsal_in_german"
    market_signal_keywords:
      job_signals: ["kulturmanagement", "projektmanagement_kultur", "bildungsreferent"]
      articles:    ["interview", "vorstellungsgespräch", "auswahlverfahren"]
    name: "Interview rehearsal in German (case answers + STAR stories)"
    scores:
      market_frequency: 0.80
      target_role_relevance: 0.90
      profile_gap: 0.75
      evidence_output: 0.75
      feasibility: 0.85
      cost_time_penalty: 0.00
    override_category: "high_roi"
    profile_gap_addressed: "No DE-cultural-sector interview practice yet; gap-explanation answer needs polish"
    recommended_action: >
      Prepare five STAR-format answers in German: (1) tell me about
      yourself, (2) why the family-phase gap and what did you do during it,
      (3) describe a project you coordinated, (4) describe a conflict with
      an artist or stakeholder, (5) why this organisation. Rehearse aloud
      with the Sprachcoach.
    expected_visible_output: "Five rehearsed and recorded STAR answers in German"
    estimated_weekly_hours: 0.5
    estimated_cost_eur: 0
    estimated_duration_weeks: 6
    cv_linkedin_usage: "Reused as concrete examples in cover letters"
    interview_usage: "Direct material for every interview"
    target_role_relevance_note: "Universal — every role requires this"
    reason_for_priority: "Cheap, fast, and the marginal return on each rehearsal is high"
    reason_for_deferral_if_any: null

  - id: "event_production_local_landscape"
    market_signal_keywords:
      job_signals: ["veranstaltungsmanagement", "eventmanagement"]
      articles:    ["festival", "konzertdirektion", "eventagentur", "veranstaltungstechnik"]
    name: "Map BW event-production landscape (agencies, venues, ticketing)"
    scores:
      market_frequency: 0.60
      target_role_relevance: 0.70
      profile_gap: 0.65
      evidence_output: 0.60
      feasibility: 0.80
      cost_time_penalty: 0.00
    override_category: "nice_to_have"
    profile_gap_addressed: "Sub-sector #2 — DE event-agency landscape is not yet mapped"
    recommended_action: >
      Build a one-pager listing key BW event agencies, festivals and venues
      with role types (e.g. SKS Russ, Music & More, Schlossfestspiele
      Ludwigsburg, Forum Ludwigsburg, Theaterhaus Stuttgart, Stadthalle
      Sindelfingen). Note ticketing provider where visible.
    expected_visible_output: "One-page BW event-production landscape map"
    estimated_weekly_hours: 0.5
    estimated_cost_eur: 0
    estimated_duration_weeks: 4
    cv_linkedin_usage: "Background research, not a CV item"
    interview_usage: "Informs role-specific tailoring of applications and interview prep"
    target_role_relevance_note: "Relevant for sub-sector #2 (event production / agencies)"
    reason_for_priority: "Cheap orientation work; speeds up applications"
    reason_for_deferral_if_any: "Lower priority than spoken German and certifications"

  - id: "english_brushup_for_outreach_roles"
    market_signal_keywords:
      job_signals: ["education manager", "outreach"]
      articles:    ["english cultural sector", "international festival"]
    name: "English brush-up for international/outreach roles"
    scores:
      market_frequency: 0.45
      target_role_relevance: 0.55
      profile_gap: 0.60
      evidence_output: 0.50
      feasibility: 0.70
      cost_time_penalty: 0.05
    override_category: "nice_to_have"
    profile_gap_addressed: "B1 may limit Education Manager / Outreach roles at international institutions"
    recommended_action: >
      Lightweight: weekly podcast or article read in English (e.g. ABO/
      League of American Orchestras blog, Aspen Music Festival programme
      notes); occasional English self-introduction practice with tandem
      partner.
    expected_visible_output: "Improved comfort in English interview small-talk"
    estimated_weekly_hours: 0.5
    estimated_cost_eur: 0
    estimated_duration_weeks: 26
    cv_linkedin_usage: "Maintain B1 claim honestly; do not over-claim"
    interview_usage: "Useful when an interview switches to English unexpectedly"
    target_role_relevance_note: "Most BW roles are in German; this is a tail-risk hedge"
    reason_for_priority: "Low cost, modest return"
    reason_for_deferral_if_any: "Spoken German is more urgent"

  - id: "second_master_or_phd"
    market_signal_keywords:
      job_signals: []
      articles:    []
    name: "Second master's degree or PhD"
    scores:
      market_frequency: 0.15
      target_role_relevance: 0.20
      profile_gap: 0.10
      evidence_output: 0.50
      feasibility: 0.10
      cost_time_penalty: 1.00
    override_category: "avoid_for_now"
