    expected_visible_output: "None recommended now"
    estimated_weekly_hours: 0
    estimated_cost_eur: 0
    estimated_duration_weeks: 0
    cv_linkedin_usage: "Existing master's degree is sufficient"
    interview_usage: "Not relevant"
    target_role_relevance_note: "Low ROI for re-entry sprint"
    reason_for_priority: "Avoid for now"
    reason_for_deferral_if_any: "Too expensive and slow for the family-income re-entry goal"

  - id: "expensive_generalist_pm_bootcamp"
    market_signal_keywords:
      job_signals: []
      articles:    []
    name: "Expensive generalist PM bootcamp (e.g. multi-thousand-EUR programme)"
    scores:
      market_frequency: 0.30
      target_role_relevance: 0.30
      profile_gap: 0.30
      evidence_output: 0.40
      feasibility: 0.30
      cost_time_penalty: 0.80
    override_category: "avoid_for_now"
    profile_gap_addressed: "Already addressed by Google PM + Scrum Master I in progress"
    recommended_action: >
      Do not pay for an additional generalist PM bootcamp before finishing
      the two in-progress certificates. Re-evaluate only if specific target
      jobs repeatedly require PMP and only after Scrum/Google PM are
      complete.
    expected_visible_output: "None recommended now"
    estimated_weekly_hours: 0
    estimated_cost_eur: 0
    estimated_duration_weeks: 0
    cv_linkedin_usage: "Two in-progress certs are sufficient signal"
    interview_usage: "Not relevant yet"
    target_role_relevance_note: "Low marginal value until current credentials are completed"
    reason_for_priority: "Avoid for now"
    reason_for_deferral_if_any: "Cost/time not justified before in-progress certs are completed"
