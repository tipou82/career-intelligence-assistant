# Career Skill Matrix — external transition mode
#
# career_mode controls scoring weights and report framing:
#   external_transition  → bias toward Germany/Europe employability signals
#   default              → general industry monitoring
#
# Target positioning:
# "Senior System Safety / Functional Safety Architect for safety-critical
#  embedded systems, robotics, ADAS, industrial automation, and AI-enabled systems."

career_mode: external_transition

strategic_target: >
  Senior System Safety / Functional Safety Architect for safety-critical embedded
  systems, robotics, ADAS, industrial automation, and AI-enabled systems.
  External transition from Bosch automotive context into stable senior safety
  architecture roles in Germany/Europe.

primary_goals:
  - "Protect family income and employability — realistic external transition"
  - "Senior safety/system architecture roles over junior implementation roles"
  - "Germany and Europe first — remote Europe as fallback"
  - "Robotics, ISO 13849/CMSE, SOTIF, embedded AI safety as differentiation"
  - "Consulting / TÜV / assessment as parallel track"

weekly_hours_cap: 18   # hard cap — do not generate plans above this

groups:
  deep_focus:
    label: "Deep Focus — highest return on time this week"
    description: "Direct impact on job search success and income protection."
  serious:
    label: "Serious — build steadily to stay hireable"
    description: "Technical credibility that differentiates you in interviews."
  lightweight:
    label: "Lightweight — maintain awareness only"
    description: "Low time investment; mostly monitoring."
  defer:
    label: "Defer — revisit after transition"
    description: "Currently lower leverage than safety architecture positioning."

skills:

  # ════════════════════════════════
  # GROUP: DEEP FOCUS
  # ════════════════════════════════

  - name: "External job search and applications"
    priority: 5
    urgency: 5
    required_depth: 4
    category: career_transition
    group: deep_focus
    weekly_hours_baseline: 5
    rationale: >
      Direct income protection. Senior safety roles in Germany/Europe are available
      but require active pipeline management: applications, CV tailoring, LinkedIn
      signals, recruiter contact. No pipeline = no options.
    learning_task: "Apply to 3–5 roles, update LinkedIn headline, contact 1–2 recruiters or TÜV/consultancy leads"
    triggers:
      increase:
        - layoffs
        - restructuring
        - stellenabbau
        - hiring
        - job opening
        - safety engineer vacancy
        - we are hiring
        - wir suchen
      decrease: []

  - name: "Interview communication and case studies"
    priority: 5
    urgency: 5
    required_depth: 4
    category: career_transition
    group: deep_focus
    weekly_hours_baseline: 3
    rationale: >
      The gap between "good CV" and "offer" is closed in interviews.
      Senior safety architects need polished answers for: safety philosophy,
      cross-domain experience, AI trade-offs, ISO 26262 vs ISO 13849, system
      architecture decisions, and leadership positioning.
    learning_task: "Prepare 3 structured interview stories: cross-domain safety, AI safety trade-off, architecture leadership"
    triggers:
      increase:
        - interview
        - hiring process
        - assessment center
        - case study
      decrease: []

  - name: "Functional safety and system safety architecture"
    priority: 5
    urgency: 5
    required_depth: 5
    category: core_expertise
    group: deep_focus
    weekly_hours_baseline: 3
    rationale: >
      Primary differentiator and negotiation lever. Deepen cross-domain fluency:
      ISO 26262 ↔ ISO 13849 ↔ IEC 61508 ↔ IEC 62061. Safety architecture at
      system level (not just item/component level) is the senior differentiator.
    learning_task: "Write one architecture case study or decision record connecting ISO 26262 and ISO 13849 for a robotics/automation context"
    triggers:
      increase:
        - functional safety
        - system safety
        - safety architecture
        - iso 26262
        - iec 61508
        - safety-critical systems
        - safety assessment
        - safety case
      decrease: []

  - name: "ISO 13849 and CMSE"
    priority: 5
    urgency: 4
    required_depth: 4
    category: machinery_safety
    group: deep_focus
    weekly_hours_baseline: 2
    rationale: >
      Opens the industrial automation, robotics, and machinery safety market
      which is underserved by automotive-only ISO 26262 engineers. CMSE
      certification is a concrete, verifiable credential that employers recognize.
    learning_task: "Work through one PLr determination example with Category/MTTFd/DCavg; document in portfolio"
    triggers:
      increase:
        - iso 13849
        - machinery safety
        - performance level
        - pl d
        - cmse
        - collaborative robot
        - emergency stop
        - protective stop
        - safety function
        - machine safety
        - eu machinery regulation
      decrease: []

  - name: "GitHub portfolio and documentation"
    priority: 4
    urgency: 5
    required_depth: 3
    category: portfolio_visibility
    group: deep_focus
    weekly_hours_baseline: 2
    rationale: >
      External visibility for senior roles. Hiring managers at larger companies
      check GitHub. A clear architecture + documentation story closes interviews.
    learning_task: "Update README, add architecture diagram, publish test results — make portfolio externally readable in 5 min"
    triggers:
      increase:
        - portfolio importance
        - github
        - open source robotics
      decrease: []

  # ════════════════════════════════
  # GROUP: SERIOUS
  # ════════════════════════════════

  - name: "ROS2"
    priority: 4
    urgency: 4
    required_depth: 4
    category: robotics_middleware
    group: serious
    weekly_hours_baseline: 1
    rationale: >
      Differentiator for robotics and embedded AI safety roles. Maintain progress
      on Raspberry Pi demonstrator but do not let it crowd out job-search hours.
    learning_task: "Implement one ROS2 safety node; document interface in architecture diagram"
    triggers:
      increase:
        - ros2
        - robotics middleware
        - humanoid robotics
        - physical ai
        - robot safety
      decrease: []

  - name: "C++20 and safety logic"
    priority: 4
    urgency: 3
    required_depth: 5
    category: safety_software
    group: serious
    weekly_hours_baseline: 1
    rationale: >
      Implementation credibility for safety logic. Shows you can specify AND
      implement — valued for senior roles. Keep progressing but cap time.
    learning_task: "Implement one deterministic safety module (StateEvaluator or TimeoutChecker) with GoogleTest"
    triggers:
      increase:
        - c++20
        - embedded software
        - safety-critical software
      decrease: []

  - name: "AI perception monitoring"
    priority: 4
    urgency: 3
    required_depth: 5
    category: ai_safety
    group: serious
    weekly_hours_baseline: 1
    rationale: >
      Strongest technical differentiator for AI-enabled safety roles. Connects
      AI perception with deterministic safety supervision.
    learning_task: "Implement confidence/latency/stale-data monitoring nodes; document in portfolio"
    triggers:
      increase:
        - ai perception failure
        - ai safety validation
        - confidence monitoring
        - fault injection
        - physical ai safety
        - embedded ai safety
      decrease: []

  - name: "SOTIF and ISO/PAS 8800"
    priority: 4
    urgency: 3
    required_depth: 4
    category: ai_adas_safety
    group: serious
    weekly_hours_baseline: 1
    rationale: >
      Key differentiator for ADAS/AI safety roles. Links ISO 26262 background
      to AI safety regulation and upcoming compliance requirements.
    learning_task: "Read one ISO/PAS 8800 clause; map to SOTIF concept; add to portfolio ODD/scenario table"
    triggers:
      increase:
        - sotif
        - iso/pas 8800
        - ai regulation
        - high-risk ai
        - ai safety automotive
        - eu ai act
      decrease: []

  - name: "Linux practical skills"
    priority: 3
    urgency: 3
    required_depth: 3
    category: embedded_linux
    group: serious
    weekly_hours_baseline: 1
    rationale: >
      Runtime environment for demonstrator. Needed for fault injection, process
      management, and debugging — practical competency, not a career differentiator.
    learning_task: "One focused Linux task: process isolation, fault injection script, or systemd service"
    triggers:
      increase:
        - embedded linux
        - linux kernel
        - yocto
      decrease: []

  - name: "QNX and POSIX supervisor concepts"
    priority: 3
    urgency: 2
    required_depth: 2
    category: embedded_rt_os
    group: serious
    weekly_hours_baseline: 0
    rationale: >
      Useful differentiator for automotive SDV / safety RTOS roles. Build
      Linux/POSIX supervisor first; keep QNX as conceptual enhancement.
    learning_task: "Document QNX portability concept in one README section"
    triggers:
      increase:
        - qnx
        - rtos
        - software-defined vehicle
        - sdv platform
        - watchdog supervision
      decrease: []

  # ════════════════════════════════
  # GROUP: LIGHTWEIGHT
  # ════════════════════════════════

  - name: "MCP and agentic AI workflow"
    priority: 3
    urgency: 2
    required_depth: 2
    category: ai_productivity
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Useful productivity layer for AI-assisted engineering. Not a career
      identity. Position as: I use AI to accelerate safety work, not replace
      safety judgment.
    learning_task: "Use Claude/Codex for one engineering task; document result"
    triggers:
      increase:
        - mcp protocol
        - agentic ai
        - ai-assisted engineering
      decrease: []

  - name: "Career Intelligence Assistant"
    priority: 3
    urgency: 2
    required_depth: 2
    category: ai_career_strategy
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      This tool itself. Running and reviewing takes minimal time; do not build
      new features during active job search phase.
    learning_task: "Weekly: run pipeline, review report, update cv_skills.yaml self-ratings"
    triggers:
      increase:
        - career intelligence
        - job market signals
      decrease: []

  - name: "MBSE and SysML2"
    priority: 3
    urgency: 2
    required_depth: 3
    category: systems_modeling
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Useful for senior architecture positioning and Dassault/NEURA-facing roles.
      Lightweight: one Mermaid diagram per project, not full toolchain mastery.
    learning_task: "Add one Mermaid architecture diagram to portfolio"
    triggers:
      increase:
        - mbse
        - sysml
        - dassault
        - digital twin
        - virtual validation
      decrease: []

  - name: "General AI trend monitoring"
    priority: 2
    urgency: 2
    required_depth: 1
    category: awareness
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Awareness only. Generic GenAI news has near-zero actionability for a
      senior safety architect. Scan headlines; do not act unless tied to
      safety-critical embedded systems or hiring signals.
    learning_task: "Scan weekly brief; note only items directly relevant to safety standards or job market"
    triggers:
      increase:
        - ai regulation
        - ai act
        - embedded ai safety
      decrease:
        - chatbot
        - chatgpt
        - consumer ai
        - generative ai marketing

  # ════════════════════════════════
  # GROUP: DEFER
  # ════════════════════════════════

  - name: "Cloud and MLOps"
    priority: 2
    urgency: 1
    required_depth: 1
    category: deferred
    group: defer
    weekly_hours_baseline: 0
    rationale: >
      Low leverage for safety architecture transition. Revisit only if a
      specific edge AI deployment role requires it.
    learning_task: "Defer — revisit after transition if required by a specific role"
    triggers:
      increase:
        - edge mlops
        - tinyml
        - embedded ml deployment
      decrease: []
