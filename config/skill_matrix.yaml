# Career Skill Matrix — T-shaped profile for AI-augmented safety systems engineer
#
# Target positioning: "AI-augmented safety systems engineer for embedded AI / robotics / ADAS systems"
#
# Three dimensions per skill:
#   priority      (1–5): long-term career leverage
#   urgency       (1–5): importance in the next 3 months
#   required_depth(1–5): how deep the knowledge must go for the target profile
#
# weekly_hours_baseline: default allocation; report may adjust based on article signals
# category: used for grouping in the report
# group: strategic focus group (deep_focus | serious | lightweight | defer)

strategic_target: "AI-augmented safety systems engineer for embedded AI / robotics / ADAS systems"

groups:
  deep_focus:
    label: "Deep Focus — do intensively now"
    description: "Core T-shaped depth. These skills define the credibility of the portfolio."
  serious:
    label: "Serious — build steadily"
    description: "Important supporting layer. Allocate consistent weekly time without crowding out deep focus."
  lightweight:
    label: "Lightweight — maintain awareness"
    description: "Relevant but not bottleneck skills. Allocate modest time; avoid rabbit holes."
  defer:
    label: "Defer — revisit in 6+ months"
    description: "Currently lower leverage than embedded AI / ROS2 / C++ safety logic."

