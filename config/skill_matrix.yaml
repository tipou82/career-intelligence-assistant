# Career Skill Matrix — external transition mode
#
# career_mode controls scoring weights and report framing:
#   external_transition  → bias toward Germany/Europe employability signals
#   default              → general industry monitoring
#
# Target positioning:
# "Senior System Safety / Functional Safety Architect for safety-critical
#  embedded systems, robotics, ADAS, industrial automation, and AI-enabled systems."

career_mode: external_transition

strategic_target: >
  Senior System Safety / Functional Safety Architect for safety-critical embedded
  systems, robotics, ADAS, industrial automation, and AI-enabled systems.
  External transition from current employer into stable senior safety
  architecture roles in Germany/Europe.

primary_goals:
  - "Protect family income and employability — realistic external transition"
  - "Senior safety/system architecture roles over junior implementation roles"
  - "Germany and Europe first — remote Europe as fallback"
  - "ISO 13849/CMSE, SOTIF, embedded AI safety as differentiation alongside ISO 26262 core"
  - "Consulting / TÜV / assessment as parallel track"
  - "Bosch Japan remains optional only — do not treat as default career path"

core_differentiator: >
  Senior functional safety / system safety architecture expertise (ISO 26262, safety
  concepts, safety requirements, safety mechanisms, architecture trade-offs) built
  at current employer. ROS2 / C++20 / embedded implementation are supporting demonstrator skills —
  they are NOT the primary market value. Do not over-prioritize them over safety
  architecture, ISO 13849, SOTIF or cross-domain communication.

weekly_hours_cap: 30          # sustainable planning cap (full-time + two small children)
weekly_hours_stretch_cap: 35  # hard ceiling — never generate plans above this

groups:
  deep_focus:
    label: "Deep Focus — highest return on time this week"
    description: "Direct impact on job search success and income protection."
  serious:
    label: "Serious — build steadily to stay hireable"
    description: "Technical credibility that differentiates you in interviews."
  lightweight:
    label: "Lightweight — maintain awareness only"
    description: "Low time investment; mostly monitoring."
  defer:
    label: "Defer — revisit after transition"
    description: "Currently lower leverage than safety architecture positioning."

skills:

  # ════════════════════════════════
  # GROUP: DEEP FOCUS
  # ════════════════════════════════

  - name: "External job search and applications"
    priority: 5
    urgency: 5
    required_depth: 4
    category: career_transition
    group: deep_focus
    weekly_hours_baseline: 8
    rationale: >
      Direct income protection. Senior safety roles in Germany/Europe are available
      but require active pipeline management: applications, CV tailoring, LinkedIn
      signals, recruiter contact. No pipeline = no options.
    learning_task: "3–5 targeted applications, 1 recruiter/TÜV contact, LinkedIn signal check, track pipeline"
    triggers:
      increase:
        - layoffs
        - restructuring
        - stellenabbau
        - hiring
        - job opening
        - safety engineer vacancy
        - we are hiring
        - wir suchen
      decrease: []

  - name: "Interview communication and case studies"
    priority: 5
    urgency: 5
    required_depth: 4
    category: career_transition
    group: deep_focus
    weekly_hours_baseline: 5
    rationale: >
      The gap between "good CV" and "offer" is closed in interviews.
      Senior safety architects need polished answers for: safety philosophy,
      cross-domain experience, AI trade-offs, ISO 26262 vs ISO 13849, system
      architecture decisions, and leadership positioning in German/English.
    learning_task: "Prepare/refine 2 structured interview stories; practice one answer out loud in German and English"
    triggers:
      increase:
        - interview
        - hiring process
        - assessment center
        - case study
      decrease: []

  - name: "Functional safety and system safety architecture"
    priority: 5
    urgency: 5
    required_depth: 5
    category: core_expertise
    group: deep_focus
    weekly_hours_baseline: 3
    rationale: >
      PRIMARY market value and negotiation lever. Strong project background from current employer:
      safety concepts, safety requirements, safety mechanisms, embedded platform safety,
      and architecture trade-offs. Deepen cross-domain fluency and case-study packaging:
      ISO 26262 ↔ ISO 13849 ↔ IEC 61508 ↔ SOTIF. This is what makes the candidate
      senior — not ROS2 or C++ implementation.
    learning_task: "Write one cross-domain safety architecture case study (e.g. ISO 26262 safety concept applied to a robotics/automation context with ISO 13849 mapping)"
    triggers:
      increase:
        - functional safety
        - system safety
        - safety architecture
        - iso 26262
        - iec 61508
        - safety-critical systems
        - safety assessment
        - safety case
      decrease: []

  - name: "ISO 13849 and CMSE"
    priority: 5
    urgency: 5
    required_depth: 4
    category: machinery_safety
    group: deep_focus
    weekly_hours_baseline: 5
    rationale: >
      Opens industrial automation, robotics, and machinery safety market —
      underserved by automotive-only ISO 26262 engineers. CMSE certification
      is a concrete, verifiable credential. Strong transferable background
      from ISO 26262 (HARA ↔ risk graph, ASIL ↔ PL, safety mechanisms ↔ SRP/CS).
      Urgency raised: no practical machinery project yet, structured study needed.
    learning_task: "CMSE study: safety function → PLr → Category → MTTFd/DCavg/CCF → achieved PL. Document one worked example per week"
    triggers:
      increase:
        - iso 13849
        - machinery safety
        - performance level
        - pl d
        - cmse
        - collaborative robot
        - emergency stop
        - protective stop
        - safety function
        - machine safety
        - eu machinery regulation
      decrease: []

  - name: "GitHub portfolio and documentation"
    priority: 4
    urgency: 5
    required_depth: 3
    category: portfolio_visibility
    group: deep_focus
    weekly_hours_baseline: 4
    rationale: >
      Covers CV tailoring, LinkedIn positioning, and portfolio documentation.
      Includes: writing one concrete CV bullet per week, updating LinkedIn headline/
      summary with cross-domain safety story, polishing portfolio README.
      External visibility for senior roles — closes interviews.
    learning_task: "CV: 1 new bullet quantifying safety architecture impact. LinkedIn: update headline/summary. Portfolio: one documentation improvement"
    triggers:
      increase:
        - portfolio importance
        - github
        - open source robotics
      decrease: []

  # ════════════════════════════════
  # GROUP: SERIOUS
  # ════════════════════════════════

  - name: "ROS2"
    priority: 3
    urgency: 3
    required_depth: 3
    category: robotics_middleware
    group: serious
    weekly_hours_baseline: 2
    rationale: >
      Supporting demonstrator skill — useful context for robotics safety roles.
      NOT the primary market value; safety architecture and ISO standards matter more.
      Allocate demonstrator improvement time here only after job-search and CMSE work.
      3h/week total for ROS2 + Linux demonstrator combined.
    learning_task: "Demonstrator: one ROS2/Linux improvement (node, test, or documentation) — keep scoped, do not expand scope"
    triggers:
      increase:
        - ros2
        - robotics middleware
        - humanoid robotics
        - physical ai
        - robot safety
      decrease: []

  - name: "C++20 and safety logic"
    priority: 3
    urgency: 2
    required_depth: 4
    category: safety_software
    group: serious
    weekly_hours_baseline: 0
    rationale: >
      Implementation credibility for safety logic demonstrator. NOT a primary
      differentiator for senior safety architecture roles. Bundled into ROS2/
      demonstrator time when relevant. Do not allocate separate weekly hours
      until safety architecture, CMSE, and job-search tracks are stable.
    learning_task: "Bundled into demonstrator time — implement only when directly needed for ROS2 safety node"
    triggers:
      increase:
        - c++20
        - embedded software
        - safety-critical software
      decrease: []

  - name: "AI perception monitoring"
    priority: 3
    urgency: 2
    required_depth: 4
    category: ai_safety
    group: serious
    weekly_hours_baseline: 0
    rationale: >
      Strong differentiator for ADAS/AI safety roles. Bundled into demonstrator
      time when relevant. Not a standalone weekly commitment during job-search phase.
    learning_task: "Bundled into demonstrator time — add one monitoring concept (confidence/latency) when working on ROS2 nodes"
    triggers:
      increase:
        - ai perception failure
        - ai safety validation
        - confidence monitoring
        - fault injection
        - physical ai safety
        - embedded ai safety
      decrease: []

  - name: "SOTIF and ISO/PAS 8800"
    priority: 4
    urgency: 4
    required_depth: 4
    category: ai_adas_safety
    group: serious
    weekly_hours_baseline: 2
    rationale: >
      Key differentiator for ADAS/AI safety roles and growing mandatory for any
      senior safety architect discussing AI-enabled systems. Links ISO 26262
      background to AI safety regulation and EU AI Act compliance requirements.
    learning_task: "SOTIF/PAS 8800: one clause or concept per week; map to ODD or perception limitation; add to case study"
    triggers:
      increase:
        - sotif
        - iso/pas 8800
        - ai regulation
        - high-risk ai
        - ai safety automotive
        - eu ai act
      decrease: []

  - name: "Linux practical skills"
    priority: 3
    urgency: 3
    required_depth: 3
    category: embedded_linux
    group: serious
    weekly_hours_baseline: 1
    rationale: >
      Runtime environment for demonstrator. Bundled with ROS2 demonstrator time.
      Not a career differentiator — practical competency only.
    learning_task: "Bundled with ROS2 demonstrator time — one Linux task when needed for Pi project"
    triggers:
      increase:
        - embedded linux
        - linux kernel
        - yocto
      decrease: []

  - name: "QNX and POSIX supervisor concepts"
    priority: 2
    urgency: 2
    required_depth: 2
    category: embedded_rt_os
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Conceptual knowledge only — no practical project experience yet.
      Mention as design consideration in portfolio; do not claim hands-on
      proficiency. Only invest time if a specific SDV/RTOS role requires it.
    learning_task: "Read one QNX/POSIX concept; mention portability design in portfolio README — no coding sprint"
    triggers:
      increase:
        - qnx
        - rtos
        - software-defined vehicle
        - sdv platform
        - watchdog supervision
      decrease: []

  # ════════════════════════════════
  # GROUP: LIGHTWEIGHT
  # ════════════════════════════════

  - name: "MCP and agentic AI workflow"
    priority: 3
    urgency: 2
    required_depth: 2
    category: ai_productivity
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Useful productivity layer for AI-assisted engineering. Not a career
      identity. Position as: I use AI to accelerate safety work, not replace
      safety judgment.
    learning_task: "Use Claude/Codex for one engineering task; document result"
    triggers:
      increase:
        - mcp protocol
        - agentic ai
        - ai-assisted engineering
      decrease: []

  - name: "Career Intelligence Assistant"
    priority: 3
    urgency: 2
    required_depth: 2
    category: ai_career_strategy
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      This tool itself. Running and reviewing takes minimal time; do not build
      new features during active job search phase.
    learning_task: "Weekly: run pipeline, review report, update cv_skills.yaml self-ratings"
    triggers:
      increase:
        - career intelligence
        - job market signals
      decrease: []

  - name: "MBSE and SysML2"
    priority: 3
    urgency: 2
    required_depth: 3
    category: systems_modeling
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Useful for senior architecture positioning and Dassault/NEURA-facing roles.
      Lightweight: one Mermaid diagram per project, not full toolchain mastery.
    learning_task: "Add one Mermaid architecture diagram to portfolio"
    triggers:
      increase:
        - mbse
        - sysml
        - dassault
        - digital twin
        - virtual validation
      decrease: []

  - name: "General AI trend monitoring"
    priority: 2
    urgency: 2
    required_depth: 1
    category: awareness
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Awareness only. Generic GenAI news has near-zero actionability for a
      senior safety architect. Scan headlines; do not act unless tied to
      safety-critical embedded systems or hiring signals.
    learning_task: "Scan weekly brief; note only items directly relevant to safety standards or job market"
    triggers:
      increase:
        - ai regulation
        - ai act
        - embedded ai safety
      decrease:
        - chatbot
        - chatgpt
        - consumer ai
        - generative ai marketing

  # ════════════════════════════════
  # GROUP: DEFER
  # ════════════════════════════════

  - name: "Cloud and MLOps"
    priority: 2
    urgency: 1
    required_depth: 1
    category: deferred
    group: defer
    weekly_hours_baseline: 0
    rationale: >
      Low leverage for safety architecture transition. Revisit only if a
      specific edge AI deployment role requires it.
    learning_task: "Defer — revisit after transition if required by a specific role"
    triggers:
      increase:
        - edge mlops
        - tinyml
        - embedded ml deployment
