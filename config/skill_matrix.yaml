# Career Skill Matrix — external transition mode (cultural project management)
#
# career_mode controls scoring weights and report framing:
#   external_transition  → bias toward Germany/Europe employability signals
#   default              → general industry monitoring
#
# Target positioning:
# "Cultural Project Manager for education programs, event production,
#  concert/theatre houses and exhibitions in the Stuttgart / Leonberg region."

career_mode: external_transition

strategic_target: >
  Cultural project manager (Kulturmanager*in / Projektmanager*in Kultur)
  in the Stuttgart–Leonberg–Ludwigsburg–Böblingen area, focusing on
  education programs and event production as primary, music institutions
  and exhibitions as secondary. Re-entry into the German labour market
  after a family phase, leveraging international experience from
  the China National Symphony Orchestra and a French master's in
  music & cultural administration.

primary_goals:
  - "Re-enter the German cultural-sector labour market with a credible mid-level project-management profile"
  - "Education programs and event production first; classical music institutions and museums second"
  - "Local first — Leonberg, Stuttgart, Böblingen, Ludwigsburg — remote BW/DE as fallback"
  - "Close the German-oral-fluency gap to interview level (current Telc B2, target spoken B2+/C1 confidence)"
  - "Convert Google Project Manager certificate and Professional Scrum Master I into visible CV/LinkedIn credentials"
  - "Reframe China National Symphony Orchestra experience into German-readable mid-level project management language"

core_differentiator: >
  Bilingual cultural-administration profile (Chinese native, German B2, English B1,
  French basics) with a master's in music & cultural administration from France and
  five years of PR / media / project coordination at a national symphony orchestra.
  Currently strengthening modern PM methodology (Google PM, Scrum) — positions
  Xi as a methodical, international, music-literate project manager rather than a
  general administrator. Do not over-pivot into pure event-marketing or pure
  music-teaching identities — the value sits in PROJECT MANAGEMENT inside
  cultural organisations.

weekly_hours_cap: 15          # sustainable planning cap (family phase, 2 small children)
weekly_hours_stretch_cap: 18  # hard ceiling — never generate plans above this

groups:
  deep_focus:
    label: "Deep Focus — highest return on time this week"
    description: "Directly converts to interviews, offers, or closing the German-oral gap."
  serious:
    label: "Serious — build steadily to stay competitive"
    description: "Subject-matter credibility for cultural-PM interviews."
  lightweight:
    label: "Lightweight — maintain awareness only"
    description: "Low time investment; mostly scanning."
  defer:
    label: "Defer — revisit after first offer"
    description: "Not load-bearing for the current re-entry sprint."

skills:

  # ════════════════════════════════
  # GROUP: DEEP FOCUS
  # ════════════════════════════════

  - name: "External job search and applications"
    priority: 5
    urgency: 5
    required_depth: 3
    category: career_transition
    group: deep_focus
    weekly_hours_baseline: 4
    rationale: >
      The only activity that converts into offers. Local cultural-sector roles
      in BW are scarce relative to tech jobs, so a steady pipeline of 3–5
      tailored applications per week is required. Includes job-board scanning
      (Bundesagentur, Kulturmanagement.net, Indeed, LinkedIn, Stadtverwaltung
      sites) and active outreach to Stuttgarter Liederhalle, Musikhochschule
      Stuttgart, Leonberger Kulturamt and similar.
    learning_task: "3 tailored applications + 1 active outreach (recruiter, alumni, or hiring manager) per week; maintain application tracker"
    triggers:
      increase:
        - hiring
        - stellenausschreibung
        - wir suchen
        - stellenangebot
        - kulturmanager
        - bildungsreferent
        - musikvermittlung
        - veranstaltungsmanager
        - projektmanager kultur
        - education manager
        - konzertdirektion
      decrease: []

  - name: "German oral fluency and interview communication"
    priority: 5
    urgency: 5
    required_depth: 4
    category: language_communication
    group: deep_focus
    weekly_hours_baseline: 3
    rationale: >
      Xi's self-identified largest gap. Telc B2 written is achieved, spoken
      register lags behind. German cultural-sector interviews are conducted
      in German, with idiomatic expectations around Kommunikation,
      Stakeholdermanagement and Empathie. Closing this gap is the single
      highest-ROI development item.
    learning_task: "Two spoken-German sessions per week (tandem, VHS conversation course, or paid Sprachcoach); rehearse 1 STAR-format interview answer aloud"
    triggers:
      increase:
        - interview
        - vorstellungsgespräch
        - assessment center
        - bewerbungsgespräch
      decrease: []

  - name: "Project management certification (Google PM + Scrum Master I)"
    priority: 5
    urgency: 5
    required_depth: 3
    category: pm_credentials
    group: deep_focus
    weekly_hours_baseline: 3
    rationale: >
      Two certifications already in progress. Together they signal modern,
      methodical project management practice — directly addresses the
      "what have you been doing during the family phase" interview question
      and reframes Xi as PM-current, not just "former orchestra
      administrator". Finish both within 8–12 weeks and add to CV/LinkedIn.
    learning_task: "Complete one Coursera module of Google PM weekly; one Scrum Master I prep block; book exam dates as soon as both are 80% complete"
    triggers:
      increase:
        - scrum master
        - project manager certification
        - agile project management
        - pmi
        - pmp
      decrease: []

  - name: "CV, LinkedIn and portfolio for DE cultural sector"
    priority: 4
    urgency: 5
    required_depth: 3
    category: portfolio_visibility
    group: deep_focus
    weekly_hours_baseline: 2
    rationale: >
      Current CV is correctly formatted but still presents Xi primarily as a
      former Chinese-orchestra PR person. Needs translation into the
      vocabulary of DE cultural project management: Projektkoordination,
      Veranstaltungsmanagement, Stakeholderkommunikation, Künstlerbetreuung,
      Pressearbeit, Bildungsformate, interkulturelle Vermittlung.
      LinkedIn profile (German + English) should match.
    learning_task: "Each week: refine one CV bullet (German), one LinkedIn section, and add one concrete project artefact (programme leaflet, press release, event timeline)"
    triggers:
      increase:
        - cv tips
        - linkedin
        - personal branding
        - kulturmanagement netzwerk
      decrease: []

  # ════════════════════════════════
  # GROUP: SERIOUS
  # ════════════════════════════════

  - name: "Cultural project management practice (DE conventions)"
    priority: 4
    urgency: 4
    required_depth: 4
    category: core_expertise
    group: serious
    weekly_hours_baseline: 1
    rationale: >
      Xi has practiced cultural project work in China; the German cultural
      sector uses different governance models (Trägerschaft, öffentlich vs.
      frei, Fördermittel, GEMA, Künstlersozialkasse). Build a working mental
      model of these so interviews don't expose unfamiliarity. Use
      Kulturmanagement Network (kulturmanagement.net) and Bühnenverein
      materials as primary references.
    learning_task: "Read one short article or one funding-call summary per week; note the institutional vocabulary"
    triggers:
      increase:
        - kulturmanagement
        - kulturförderung
        - fördermittel
        - bühnenverein
        - kulturstiftung
        - öffentlich gefördert
      decrease: []

  - name: "Music education and Musikvermittlung"
    priority: 4
    urgency: 4
    required_depth: 3
    category: education_programs
    group: serious
    weekly_hours_baseline: 1
    rationale: >
      Education programs are Xi's #1 sub-sector. Musikvermittlung is the
      German term-of-art for music education projects in concert houses,
      orchestras and music schools (Konzertpädagogik, Kinderkonzerte,
      Schulkooperationen). Xi's conservatory background plus orchestra
      experience makes this a credible pitch. Track Netzwerk Junge Ohren,
      Bundesverband Musikunterricht, and Musikschulen-Verband signals.
    learning_task: "Read one Musikvermittlung case study or programme description per week; sketch how a similar project would look at a local Stuttgart/Leonberg venue"
    triggers:
      increase:
        - musikvermittlung
        - konzertpädagogik
        - kinderkonzert
        - schulkonzert
        - jugendkonzert
        - musikschule
        - bildungspartnerschaft
        - kulturelle bildung
      decrease: []

  - name: "Event production and coordination"
    priority: 3
    urgency: 3
    required_depth: 3
    category: event_production
    group: serious
    weekly_hours_baseline: 1
    rationale: >
      Sub-sector #2. Operational backbone of cultural project work:
      schedule, venue logistics, artist contracting, technical riders, GEMA,
      ticketing. Xi has practical experience from CNSO but must learn the
      DE-specific service-provider landscape (CTS Eventim, ticket.io,
      Reservix; agencies in BW like SKS Russ, Music & More, c/o pop).
    learning_task: "Identify one BW event agency or venue per week; note their typical event size, niche, and any open vacancies"
    triggers:
      increase:
        - veranstaltungsmanagement
        - eventmanagement
        - veranstaltungstechnik
        - festival
        - konzertdirektion
        - tournee
        - tour management
      decrease: []

  - name: "PR, media and content for cultural institutions"
    priority: 3
    urgency: 3
    required_depth: 4
    category: pr_communication
    group: serious
    weekly_hours_baseline: 0.5
    rationale: >
      This was Xi's strongest area at CNSO. Maintain as recognised secondary
      skill but do NOT let it become the headline identity (PR-only roles
      are crowded and lower-paid than PM roles in DE). Keep one writing
      sample per quarter to demonstrate fluency.
    learning_task: "Maintain one bilingual writing sample (press release or programme note); track DE cultural-PR style trends lightly"
    triggers:
      increase:
        - pressearbeit
        - öffentlichkeitsarbeit
        - kommunikation
        - social media kultur
        - newsletter kultur
      decrease: []

  # ════════════════════════════════
  # GROUP: LIGHTWEIGHT
  # ════════════════════════════════

  - name: "AI tools for cultural administration"
    priority: 3
    urgency: 2
    required_depth: 2
    category: ai_productivity
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Already on CV. Useful productivity layer (drafting, translation,
      proof-reading, data analysis of audience or ticket data). Frame as
      tool, never as primary identity.
    learning_task: "Use Claude or similar for one practical task per week; note where it saved time"
    triggers:
      increase:
        - chatgpt cultural
        - ki im kulturbetrieb
        - ai cultural sector
        - copilot office
      decrease: []

  - name: "Exhibitions and museum education"
    priority: 3
    urgency: 2
    required_depth: 2
    category: museum_education
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Sub-sector #4. Awareness only — Staatsgalerie Stuttgart, Kunstmuseum
      Stuttgart, Lindenmuseum, Mercedes-Benz Museum and the Leonberg
      Heimatmuseum are credible secondary targets if a museum-education
      vacancy opens. Vocabulary differs from concert-house PM.
    learning_task: "Scan headlines; deep-read only if a relevant vacancy or programme call appears"
    triggers:
      increase:
        - museumspädagogik
        - museumsführung
        - ausstellungskonzeption
        - kuratorisch
        - sammlungsmanagement
      decrease: []

  - name: "Local cultural-sector networking (Stuttgart region)"
    priority: 3
    urgency: 3
    required_depth: 2
    category: networking
    group: lightweight
    weekly_hours_baseline: 0.5
    rationale: >
      Many cultural-sector roles in BW are not openly advertised. Network
      access via VHS, Kreisvolkshochschule Böblingen, alumni groups, and
      cultural events compensates for that. One concrete contact attempt
      per week is enough.
    learning_task: "Attend or contact one local event/person per week (Kulturamt info-evening, Liederhalle workshop, alumni meet-up)"
    triggers:
      increase:
        - kulturveranstaltung leonberg
        - kulturnetzwerk stuttgart
        - alumni musikhochschule
      decrease: []

  - name: "Cultural policy and funding awareness"
    priority: 2
    urgency: 2
    required_depth: 2
    category: policy_funding
    group: lightweight
    weekly_hours_baseline: 0
    rationale: >
      Programmable for later: deeper knowledge of Kulturstiftung des Bundes,
      Land BW funding, Stadt-Stiftung programmes is useful for senior roles
      but not for entry/mid-level applications.
    learning_task: "Scan headlines; bookmark funding calls but do not deep-read yet"
    triggers:
      increase:
        - kulturpolitik
        - kulturstiftung
        - kulturhaushalt
        - fördermittel kultur
      decrease: []

  # ════════════════════════════════
  # GROUP: DEFER
  # ════════════════════════════════

  - name: "French refresh"
    priority: 2
    urgency: 1
    required_depth: 1
    category: deferred
    group: defer
    weekly_hours_baseline: 0
    rationale: >
      Useful only if a francophone-cooperation role appears (Goethe Institut
      partnerships, French cultural institute, EU cross-border project).
      Do not invest until such a role is in pipeline.
    learning_task: "Defer — revisit if a francophone vacancy enters the pipeline"
    triggers:
      increase:
        - institut français
        - franco-german culture
        - co-production france
      decrease: []

  - name: "Piano performance practice"
    priority: 2
    urgency: 1
    required_depth: 2
    category: deferred
    group: defer
    weekly_hours_baseline: 0
    rationale: >
      Personal capability that backs the credibility story but is not part
      of the job-search budget. Maintain privately if desired; not counted
      against the 15h weekly cap.
    learning_task: "Outside scope of this plan — personal time"
    triggers:
      increase: []
      decrease: []
