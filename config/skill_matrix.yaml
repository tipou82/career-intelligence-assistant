  # GROUP: DEEP FOCUS
  # ════════════════════════════════

  - name: "ROS2"
    priority: 5
    urgency: 5
    required_depth: 4
    category: robotics_middleware
    group: deep_focus
    weekly_hours_baseline: 5
    rationale: >
      Backbone of the Raspberry Pi safety demonstrator. Core robotics middleware for humanoid,
      ADAS and embedded AI roles. Without running ROS2 code, the portfolio has no implementation credibility.
    learning_task: "Raspberry Pi ROS2 nodes: camera, ultrasonic, decision, actuator, health — implement, test and document"
    learning_tasks:
      - "Nodes and topics (pub/sub)"
      - "Launch files for multi-node startup"
      - "Custom message types and QoS basics"
      - "Lifecycle nodes for deterministic startup/shutdown"
      - "Integration with C++ decision logic"
    triggers:
      increase:
        - ros2
        - robotics middleware
        - humanoid robotics
        - robotic arm
        - physical ai
        - robot safety
        - legged robot
        - robotics investment
        - robotics hiring
      decrease:
        - ros2 deprecated
        - ros1 preferred

